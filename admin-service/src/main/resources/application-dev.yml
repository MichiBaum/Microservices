server:
  port: 8082


spring:
  boot:
    admin:
      service:
        username: admin_username
        password: admin_password
      ui:
        public-url: http://admin.michibaum.ch:80
      instance-auth:
        default-user-name: admin_username
        default-password: admin_password
        enabled: true
      notify:
        custom-discord:
          enabled: true
          channel-id: ${ADMIN_SERVICE_NOTIFY_DISCORD_CHANNEL}
  microservices:
    discord:
      enabled: true
      bot-token: ${DISCORD_BOT_TOKEN}
      guild-id: ${DISCORD_GUILD_ID}
      logging:
        enabled: true
        channel-id: ${DISCORD_ADMIN_SERVICE_LOG_CHANNEL}

eureka:
  client:
    service-url:
      defaultZone: http://admin_username:admin_password@localhost:8761/eureka

management:
  tracing:
    sampling:
      probability: 1.0