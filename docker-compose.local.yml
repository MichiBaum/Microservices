services:
  jaeger-storage:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    restart: always
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    restart: always
    depends_on:
      jaeger-storage:
        condition: service_healthy
    volumes:
      - ./jaeger/jaeger.yml:/etc/jaeger/jaeger.yml
      - ./jaeger/ui-config.json:/etc/jaeger/ui-config.json
    command: ["--config-file", "/etc/jaeger/jaeger.yml"]
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"