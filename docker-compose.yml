services:

  registry-service:
    image: 70131370/registry-service
    env_file:
      - .env
    restart: always
    depends_on:
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
    expose:
      - "8761"
    networks:
      - microservice-network

  admin-service:
    image: 70131370/admin-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
    expose:
      - "80"
    networks:
      - microservice-network

  authentication-service:
    image: 70131370/authentication-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
      DATABASE_USERNAME: ${AUTHENTICATION_DB_USERNAME}
      DATABASE_PASSWORD: ${AUTHENTICATION_DB_PASSWORD}
      DATABASE: ${AUTHENTICATION_DB}
    expose:
      - "80"
    networks:
      - microservice-network

  authentication-db:
    image: mariadb:10.11
    env_file:
      - .env
    restart: always
    environment:
      MARIADB_USER: ${AUTHENTICATION_DB_USERNAME}
      MARIADB_PASSWORD: ${AUTHENTICATION_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${AUTHENTICATION_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${AUTHENTICATION_DB}
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - /data/authentication-db:/var/lib/mysql
    networks:
      - microservice-network

  usermanagement-service:
    image: 70131370/usermanagement-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - usermanagement-db
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
      DATABASE_USERNAME: ${USERMANAGEMENT_DB_USERNAME}
      DATABASE_PASSWORD: ${USERMANAGEMENT_DB_PASSWORD}
      DATABASE: ${USERMANAGEMENT_DB}
    expose:
      - "80"
    networks:
      - microservice-network

  usermanagement-db:
    image: mariadb:10.11
    env_file:
      - .env
    restart: always
    environment:
      MARIADB_USER: ${USERMANAGEMENT_DB_USERNAME}
      MARIADB_PASSWORD: ${USERMANAGEMENT_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${USERMANAGEMENT_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${USERMANAGEMENT_DB}
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - /data/usermanagement-db:/var/lib/mysql
    networks:
      - microservice-network

  gateway-service:
    image: 70131370/gateway-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
    ports:
      - "443:443"
    volumes:
      - /data/ssl:/data/ssl
    networks:
      - microservice-network

  website-service:
    image: 70131370/website-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
    expose:
      - "80"
    networks:
      - microservice-network

  chess-service:
    image: 70131370/chess-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - chess-db
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
      DATABASE_USERNAME: ${CHESS_DB_USERNAME}
      DATABASE_PASSWORD: ${CHESS_DB_PASSWORD}
      DATABASE: ${CHESS_DB}
    expose:
      - "80"
    networks:
      - microservice-network

  chess-db:
    image: mariadb:10.11
    env_file:
      - .env
    restart: always
    environment:
      MARIADB_USER: ${CHESS_DB_USERNAME}
      MARIADB_PASSWORD: ${CHESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${CHESS_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${CHESS_DB}
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3309:3306"
    volumes:
      - /data/chess-db:/var/lib/mysql
    networks:
      - microservice-network

  fitness-service:
    image: 70131370/fitness-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - fitness-db
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
      DATABASE_USERNAME: ${FITNESS_DB_USERNAME}
      DATABASE_PASSWORD: ${FITNESS_DB_PASSWORD}
      DATABASE: ${FITNESS_DB}
    expose:
      - "80"
    networks:
      - microservice-network

  fitness-db:
    image: mariadb:10.11
    env_file:
      - .env
    restart: always
    environment:
      MARIADB_USER: ${FITNESS_DB_USERNAME}
      MARIADB_PASSWORD: ${FITNESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${FITNESS_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${FITNESS_DB}
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3310:3306"
    volumes:
      - /data/fitness-db:/var/lib/mysql
    networks:
      - microservice-network

  music-service:
    image: 70131370/music-service
    env_file:
      - .env
    restart: always
    depends_on:
      - registry-service
      - music-db
      - zipkin
    environment:
      spring_profiles_active: ${SPRING_ACTIVE_PROFILES}
      DATABASE_USERNAME: ${MUSIC_DB_USERNAME}
      DATABASE_PASSWORD: ${MUSIC_DB_PASSWORD}
      DATABASE: ${MUSIC_DB}
    expose:
      - "80"
    networks:
      - microservice-network

  music-db:
    image: mariadb:10.11
    env_file:
      - .env
    restart: always
    environment:
      MARIADB_USER: ${MUSIC_DB_USERNAME}
      MARIADB_PASSWORD: ${MUSIC_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MUSIC_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MUSIC_DB}
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3311:3306"
    volumes:
      - /data/music-db:/var/lib/mysql
    networks:
      - microservice-network

  zipkin-storage:
    image: ghcr.io/openzipkin/zipkin-mysql:3.4
    restart: always
    expose:
      - "3306"
    volumes:
      - /data/zipkin-storage:/var/lib/mysql
    networks:
      - microservice-network

  zipkin:
    image: ghcr.io/openzipkin/zipkin:3.4
    restart: always
    depends_on:
      - zipkin-storage
    environment:
      STORAGE_TYPE: mysql
      MYSQL_HOST: zipkin-storage
      MYSQL_USER: ${ZIPKIN_DB_USERNAME}
      MYSQL_PASS: ${ZIPKIN_DB_PASSWORD}
      EUREKA_SERVICE_URL: http://${ADMIN_SERVICE_USERNAME}:${ADMIN_SERVICE_PASSWORD}@registry-service:8761/eureka
      EUREKA_HOSTNAME: zipkin
    expose:
      - "9411"
    networks:
      - microservice-network

  zipkin-dependencies:
    image: ghcr.io/openzipkin/zipkin-dependencies
    restart: always
    depends_on:
      - zipkin-storage
    user: root
    entrypoint: /usr/sbin/crond -f
    environment:
      STORAGE_TYPE: mysql
      MYSQL_HOST: zipkin-storage
      MYSQL_USER: ${ZIPKIN_DB_USERNAME}
      MYSQL_PASS: ${ZIPKIN_DB_PASSWORD}
    networks:
      - microservice-network

#  Matomo
# https://medium.com/@davquar/matomo-lets-install-it-with-docker-512211705c76
# https://github.com/matomo-org/docker

networks:
  microservice-network:
    name: microservice-network
    driver: bridge
