server:
  port: 80

spring:
  main:
    cloud-platform: kubernetes
  boot:
    admin:
      service:
        username: ${ADMIN_SERVICE_USERNAME}
        password: ${ADMIN_SERVICE_PASSWORD}
      client:
        username: ${ADMIN_SERVICE_USERNAME}
        password: ${ADMIN_SERVICE_PASSWORD}
  microservices:
    discord:
      enabled: true
      bot-token: ${DISCORD_BOT_TOKEN}
      guild-id: ${DISCORD_GUILD_ID}
      logging:
        enabled: true
        channel-id: ${DISCORD_GATEWAY_SERVICE_LOG_CHANNEL}

eureka:
  client:
    service-url:
      defaultZone: http://${ADMIN_SERVICE_USERNAME}:${ADMIN_SERVICE_PASSWORD}@registry-service:8761/eureka

management:
  services:
    jaeger-url: http://jaeger:16686
    prometheus-url: http://prometheus:9090
    grafana-url: http://grafana:3000
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://jaeger:4318/v1/traces
          transport: http
  tracing:
    sampling:
      probability: 1.0

cors:
  allowed-origin-patterns:
    - https://michibaum.ch
    - https://*.michibaum.ch
    - https://michibaum.com
    - https://*.michibaum.com
    - https://michibaum.eu
    - https://*.michibaum.eu
    - https://michibaum.org
    - https://*.michibaum.org
    - https://michibaum.app
    - https://*.michibaum.app
    - https://michibaum.me
    - https://*.michibaum.me
    - https://michibaum.net
    - https://*.michibaum.net
    - https://michibaum.info
    - https://*.michibaum.info
    - https://michibaum.xyz
    - https://*.michibaum.xyz

sitemap-xml:
  https: true