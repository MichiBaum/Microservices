spring:
  boot:
    admin:
      client:
        username: admin_username
        password: admin_password

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  zipkin:
    tracing:
      export:
        enabled: false
  tracing:
    enabled: false
    sampling:
      probability: 1.0