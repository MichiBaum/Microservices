@if (participants.value()?.length !== 0) {
  <div class="flex flex-col gap-4">
    <div class="flex flex-col desktop:flex-row desktop:items-center justify-between gap-4 bg-surface-50 dark:bg-surface-900/50 p-4 rounded-xl border border-surface-200 dark:border-surface-800">
      <div class="flex items-center gap-2">
        <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0">{{'chess.event.participants' | translate}}</h2>
        <span class="bg-primary/10 text-primary text-xs font-bold px-2 py-0.5 rounded-full">{{participants.value()?.length}}</span>
      </div>
      <p-fieldset [toggleable]="true" [collapsed]="true" class="w-full desktop:w-auto">
        <ng-template #header>
          <div class="flex items-center gap-2">
            <i class="pi pi-sort-alt text-primary"></i>
            <span class="text-sm font-semibold">{{'general.sort' | translate}}</span>
          </div>
        </ng-template>
        <div class="flex flex-wrap gap-4 p-1">
          @for (sortOption of sortOptions; track sortOption) {
            <div class="flex items-center cursor-pointer">
              <p-radioButton [inputId]="sortOption.value" name="category" [value]="sortOption.value" [(ngModel)]="selectedSort" size="small"></p-radioButton>
              <label [for]="sortOption.value" class="ml-2 text-sm cursor-pointer font-medium text-surface-600 dark:text-surface-400">{{ sortOption.name | translate }}</label>
            </div>
          }
        </div>
      </p-fieldset>
    </div>

    <div class="grid grid-cols-1 4k:grid-cols-5 xlScreen:grid-cols-4 lScreen:grid-cols-3 desktop:grid-cols-3 laptop:grid-cols-3 tablet:grid-cols-2 mobile:grid-cols-1 gap-4">
      @for (participant of sortedParticipants(); track participant) {
        <app-chess-player-card
          [player]="participant"
          [accounts]="personsPlatformAccount(participant)"
        ></app-chess-player-card>
      }
    </div>
  </div>
}
