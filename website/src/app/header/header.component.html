<div class="flex bg-primary text-primary-contrast items-center justify-between shadow-md h-full px-4 overflow-hidden" aria-label="Header">
  <div class="flex-none basis-1/4">
    @defer () {
      <app-navigation></app-navigation>
    } @placeholder {
      <div class="p-2">
        <fa-icon [icon]="faBars" size="lg"></fa-icon>
      </div>
    }
  </div>

  <div class="grow text-center overflow-hidden px-2">
    <h1 class="font-bold text-lg mobile:text-2xl truncate" [title]="title().key | translate: title().params">
      {{ title().key | translate: title().params}}
    </h1>
  </div>

  <div class="flex-none basis-1/4 text-right">
    @defer () {
      <app-logout></app-logout>
    } @placeholder {
      <div class="p-2">
        <fa-icon [icon]="faSignOutAlt" size="lg"></fa-icon>
      </div>
    }
  </div>
</div>
