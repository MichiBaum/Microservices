<p-listbox
    [options]="languages()"
    [(ngModel)]="selectedLanguage"
    (onChange)="selectLanguage()"
    class="w-full"
    styleClass="w-full border-none bg-transparent"
>
    <ng-template #item let-item>
        <span class="text-surface-600 dark:text-surface-400 font-medium">{{ item.name | translate }}</span>
    </ng-template>
</p-listbox>
