@if (note(); as note){

        <p-card header="{{note.title}}">
            <div>
                <p class="break-words">
                    {{ (note.content || '').slice(0, 100) }}
                    {{ (note.content.length || 0) > 100 ? '…' : '' }}
                </p>
            </div>
        </p-card>

}
