<div class="flex justify-center items-center px-4">

  <p-card pFocusTrap class="max-w-xl mt-4 w-full">
    <ng-template #title>
      <div class="flex items-center gap-2">
        <fa-icon [icon]="faUserPlus" class="text-primary"></fa-icon>
        <span class="text-surface-900 dark:text-surface-0">{{ 'register.register' | translate }}</span>
      </div>
    </ng-template>

    <form [formGroup]="registerForm" class="*:mb-8 pt-4">
      <p-floatlabel class="w-full" variant="in">
        <input class="w-full" id="username" type="text" formControlName="username" pInputText />
        <label for="username" class="text-surface-600 dark:text-surface-400">{{ "register.username" | translate }}</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="in">
        <input class="w-full" id="email" type="text" formControlName="email" pInputText />
        <label for="email" class="text-surface-600 dark:text-surface-400">{{ "register.email" | translate }}</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="in">
        <p-password id="password" [feedback]="false" [toggleMask]="true" formControlName="password" class="w-full" styleClass="w-full"/>
        <label for="password" class="text-surface-600 dark:text-surface-400">{{ "register.password" | translate }}</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="in">
        <p-password id="passwordRepeat" [feedback]="false" [toggleMask]="true" formControlName="passwordRepeat" class="w-full" styleClass="w-full"/>
        <label for="passwordRepeat" class="text-surface-600 dark:text-surface-400">{{ "register.password" | translate }}</label>
      </p-floatlabel>
    </form>

    <ng-template #footer>
      <div class="flex flex-col sm:flex-row gap-4 mt-1">
        <p-button
          [label]='"register.login" | translate'
          class="w-full"
          styleClass="w-full"
          (onClick)="login()"
          variant="outlined"
        >
          <ng-template #icon>
            <fa-icon [icon]="faSignInAlt" class="mr-2"></fa-icon>
          </ng-template>
        </p-button>
        <p-button
          [label]='"register.register" | translate'
          class="w-full"
          styleClass="w-full"
          [disabled]="!registerForm.valid"
          (onClick)="register()"
        >
          <ng-template #icon>
            <fa-icon [icon]="faUserPlus" class="mr-2"></fa-icon>
          </ng-template>
        </p-button>
      </div>
    </ng-template>
  </p-card>

</div>
